name: CD - Deploy to EKS

on:
  workflow_run:
    workflows: ["CI - Build, Test & Scan"]
    types:
      - completed
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_NAME }}
  NAMESPACE: devops-app
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:

  # ============================================================
  # Deploy to EKS
  # ============================================================
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production
      url: https://myapp.yourdomain.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Set image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Replace image tag in deployment manifest
        run: |
          sed -i "s|IMAGE_TAG|${{ env.ECR_REPOSITORY }}:${{ github.sha }}|g" k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/configmap.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/deployment.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/service.yaml    -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/hpa.yaml        -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/ingress.yaml    -n ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/myapp \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get svc  -n ${{ env.NAMESPACE }}

      - name: Notify on failure - rollback
        if: failure()
        run: |
          echo "Deployment failed! Rolling back..."
          kubectl rollout undo deployment/myapp -n ${{ env.NAMESPACE }}
