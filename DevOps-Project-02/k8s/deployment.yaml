apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: devops-app
  labels:
    app: myapp
    version: "1.0"
  annotations:
    kubernetes.io/change-cause: "Initial deployment"
spec:
  replicas: 2
  revisionHistoryLimit: 5   # keep last 5 rollback versions
  selector:
    matchLabels:
      app: myapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0     # zero downtime
  template:
    metadata:
      labels:
        app: myapp
    spec:
      # Spread pods across nodes
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: myapp

      containers:
        - name: myapp
          image: IMAGE_TAG    # replaced by CI/CD pipeline
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          # Resource limits (required for HPA)
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Environment from ConfigMap and Secrets
          envFrom:
            - configMapRef:
                name: myapp-config
            - secretRef:
                name: myapp-secret

          # Liveness probe - restart if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # Readiness probe - route traffic only when ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # Startup probe - for slow-starting containers
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

      # Graceful shutdown
      terminationGracePeriodSeconds: 30
