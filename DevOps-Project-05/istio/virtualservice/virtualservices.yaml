# ==============================================
# Istio VirtualServices - traffic routing rules
# Supports: canary deploys, retries, timeouts,
# fault injection, header-based routing
# ==============================================

# ── API Gateway VirtualService ────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway-vs
  namespace: devops-p05
spec:
  hosts:
    - api.devops-p05.com
    - api-gateway
  gateways:
    - microservices-gateway
    - mesh
  http:
    - match:
        - uri:
            prefix: /api/orders
      route:
        - destination:
            host: order-service
            port:
              number: 8081
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: gateway-error,connect-failure,retriable-4xx

    - match:
        - uri:
            prefix: /api/inventory
      route:
        - destination:
            host: inventory-service
            port:
              number: 8082
      timeout: 10s

    - match:
        - uri:
            prefix: /api/notifications
      route:
        - destination:
            host: notification-service
            port:
              number: 8083

    - route:
        - destination:
            host: api-gateway
            port:
              number: 8080
---
# ── Order Service VirtualService (with Canary) ────────────────
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: order-service-vs
  namespace: devops-p05
spec:
  hosts:
    - order-service
  http:
    # Canary: 10% traffic to v2, 90% to v1
    - route:
        - destination:
            host: order-service
            subset: v1
          weight: 90
        - destination:
            host: order-service
            subset: v2
          weight: 10
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
---
