# ==============================================
# Logstash Pipeline - microservices-pipeline.conf
# Ingests logs from all microservices,
# enriches with metadata, sends to Elasticsearch
# ==============================================

input {
  # Receive logs from Filebeat agents on pods
  beats {
    port => 5044
    codec => json
  }

  # Direct TCP input for local testing
  tcp {
    port => 5000
    codec => json_lines
  }

  # Pull from Kafka for event streaming logs
  kafka {
    bootstrap_servers => "${KAFKA_BROKERS:kafka:9092}"
    topics => ["order-events", "inventory-events", "notification-events"]
    group_id => "logstash-elk-consumer"
    codec => json
    consumer_threads => 3
    decorate_events => true
  }
}

filter {
  # Parse JSON logs from Spring Boot
  if [type] == "spring-boot" or [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log"
    }
  }

  # Add service name from Docker/K8s label
  if [kubernetes][labels][app] {
    mutate {
      add_field => { "service_name" => "%{[kubernetes][labels][app]}" }
    }
  }

  # Parse timestamp
  date {
    match => ["[log][timestamp]", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSS"]
    target => "@timestamp"
  }

  # Tag error logs
  if [log][level] == "ERROR" or [log][level] == "FATAL" {
    mutate {
      add_tag => ["error"]
    }
  }

  # Enrich order events from Kafka
  if [kafka][topic] == "order-events" {
    mutate {
      add_field => { "event_source" => "kafka" }
      add_field => { "event_type"   => "order" }
    }
  }

  # Remove sensitive fields
  mutate {
    remove_field => ["password", "token", "secret", "authorization"]
  }

  # Add environment metadata
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:production}"
      "cluster"     => "${CLUSTER_NAME:devops-p05}"
    }
  }
}

output {
  # Main index - all logs
  elasticsearch {
    hosts           => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
    index           => "microservices-logs-%{+YYYY.MM.dd}"
    template_name   => "microservices"
    manage_template => false
  }

  # Separate index for errors
  if "error" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
      index => "microservices-errors-%{+YYYY.MM.dd}"
    }
  }

  # Separate index for Kafka events
  if [event_source] == "kafka" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
      index => "kafka-events-%{+YYYY.MM.dd}"
    }
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }
}
