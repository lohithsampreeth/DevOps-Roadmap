# ==============================================
# K8s Base Manifests - all microservices
# Used by Kustomize overlays for AWS/Azure
# ==============================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: devops-p05
  labels:
    istio-injection: enabled     # Enable Istio sidecar injection
---
# ── API Gateway ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: devops-p05
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
      version: v1
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
        co.elastic.logs/enabled: "true"
    spec:
      containers:
        - name: api-gateway
          image: lohithsampreeth/api-gateway:latest
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: devops-p05
spec:
  selector: { app: api-gateway }
  ports:
    - port: 8080
      targetPort: 8080
---
# ── Order Service ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: devops-p05
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
      version: v1
  template:
    metadata:
      labels:
        app: order-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "order-service"
    spec:
      containers:
        - name: order-service
          image: lohithsampreeth/order-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: kafka.brokers
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /api/orders/health, port: 8081 }
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: devops-p05
spec:
  selector: { app: order-service }
  ports:
    - port: 8081
      targetPort: 8081
---
# ── Inventory Service ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: devops-p05
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
      version: v1
  template:
    metadata:
      labels:
        app: inventory-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: inventory-service
          image: lohithsampreeth/inventory-service:latest
          ports:
            - containerPort: 8082
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /api/inventory/health, port: 8082 }
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: devops-p05
spec:
  selector: { app: inventory-service }
  ports:
    - port: 8082
      targetPort: 8082
---
# ── Notification Service ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: devops-p05
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
      version: v1
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
    spec:
      containers:
        - name: notification-service
          image: lohithsampreeth/notification-service:latest
          ports:
            - containerPort: 8083
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 300m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: devops-p05
spec:
  selector: { app: notification-service }
  ports:
    - port: 8083
      targetPort: 8083
---
# ── ConfigMap ─────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: devops-p05
data:
  kafka.brokers: "kafka.kafka.svc.cluster.local:9092"
  elasticsearch.host: "elasticsearch.elk.svc.cluster.local:9200"
  environment: "production"
