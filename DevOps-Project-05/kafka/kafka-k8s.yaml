# ==============================================
# Kafka on Kubernetes using Strimzi Operator
# Install operator first:
#   kubectl create namespace kafka
#   kubectl apply -f https://strimzi.io/install/latest?namespace=kafka
# ==============================================
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: devops-p05-kafka
  namespace: kafka
spec:
  kafka:
    version: 3.5.1
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      log.retention.hours: 168         # 7 days
    storage:
      type: persistent-claim
      size: 50Gi
      class: standard
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 4Gi
        cpu: 2000m
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 10Gi
      class: standard
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
# ── Kafka Topics via Strimzi ──────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: order-events
  namespace: kafka
  labels:
    strimzi.io/cluster: devops-p05-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "604800000"
    cleanup.policy: delete
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: inventory-events
  namespace: kafka
  labels:
    strimzi.io/cluster: devops-p05-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "604800000"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: notification-events
  namespace: kafka
  labels:
    strimzi.io/cluster: devops-p05-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: "259200000"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: order-events-dlq
  namespace: kafka
  labels:
    strimzi.io/cluster: devops-p05-kafka
spec:
  partitions: 1
  replicas: 3
  config:
    retention.ms: "2592000000"
