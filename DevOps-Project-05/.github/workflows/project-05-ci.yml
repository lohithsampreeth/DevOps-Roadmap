name: Project-05 CI — Microservices Build & Scan

on:
  push:
    branches: [main]
    paths:
      - 'DevOps-Project-05/services/**'
      - 'DevOps-Project-05/terraform/**'
  pull_request:
    branches: [main]
    paths:
      - 'DevOps-Project-05/services/**'

env:
  IMAGE_PREFIX: lohithsampreeth

jobs:
  secret-scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  build-service:
    name: Build & Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      matrix:
        service: [api-gateway, order-service, inventory-service, notification-service]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: DevOps-Project-05/services/${{ matrix.service }}
        run: mvn clean package --batch-mode

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: DevOps-Project-05/services/${{ matrix.service }}
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Docker Build & Push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: DevOps-Project-05/services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

      - name: Trivy Image Scan
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: '1'

  terraform-plan:
    name: Terraform Plan (Multi-Cloud)
    runs-on: ubuntu-latest
    needs: build-service
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
      - name: Plan AWS
        working-directory: DevOps-Project-05/terraform/aws
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform init && terraform plan
        continue-on-error: true
      - name: Plan Azure
        working-directory: DevOps-Project-05/terraform/azure
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform init && terraform plan
        continue-on-error: true
