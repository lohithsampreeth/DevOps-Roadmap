name: Project-04 CI — Build, Scan & GitOps Deploy

on:
  push:
    branches: [main]
    paths:
      - 'DevOps-Project-04/app/**'
  pull_request:
    branches: [main]
    paths:
      - 'DevOps-Project-04/app/**'

env:
  IMAGE_NAME: lohithsampreeth/inventory-manager
  HELM_VALUES_PATH: DevOps-Project-04/helm/inventory-app/values.yaml

defaults:
  run:
    working-directory: DevOps-Project-04/app

jobs:

  # ── Build & Test ──────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn clean package --batch-mode

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: DevOps-Project-04/app/target/*.jar

  # ── Security Scans ────────────────────────────────────
  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: DevOps-Project-04/app
          severity: CRITICAL,HIGH
          exit-code: 0   # warn only for FS scan

  # ── Docker Build & Image Scan ─────────────────────────
  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: DevOps-Project-04/app/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            .

      - name: Trivy Image Scan (fail on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # ── GitOps: Update Helm values → ArgoCD auto-syncs ───
  gitops:
    name: Update Helm Values (GitOps)
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # needs write access to push

      - name: Update image tag in Helm values
        run: |
          sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|" ${{ env.HELM_VALUES_PATH }}
          cat ${{ env.HELM_VALUES_PATH }} | grep tag

      - name: Commit and push updated values
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.HELM_VALUES_PATH }}
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push
        # ArgoCD detects this commit → auto-syncs → deploys new image to K8s
