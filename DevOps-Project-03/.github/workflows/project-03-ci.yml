name: Project-03 CI - Java Build & Scan

on:
  push:
    branches: [main]
    paths:
      - 'DevOps-Project-03/**'
  pull_request:
    branches: [main]
    paths:
      - 'DevOps-Project-03/**'

defaults:
  run:
    working-directory: DevOps-Project-03

jobs:
  build-and-scan:
    name: Build, Test & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: mvn clean package --batch-mode

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: mvn sonar:sonar -Dsonar.token=$SONAR_TOKEN -Dsonar.host.url=$SONAR_HOST_URL

      - name: Docker Build
        run: docker build -f docker/Dockerfile -t devops-task-manager:${{ github.sha }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-task-manager:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
